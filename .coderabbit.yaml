# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# Loom — AI Dev Control Plane
# Web: React 19 + Vite + Tailwind v4 | Mobile: Expo SDK 53 + React Native 0.79
# Backend: Express 4 + SQLite (better-sqlite3) + WebSocket (ws)
# Shared: @loom/shared types + store factories

language: en-US
tone_instructions: "Be direct and actionable. Focus on bugs, security, and convention violations. Skip praise. Grade issues by severity: critical (security/data loss), high (logic bugs), medium (missing validation/error handling), low (style nits). This is a solo dev project — don't suggest over-engineering."
early_access: true

reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: false
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: false
  poem: false
  assess_linked_issues: true
  related_issues: true
  related_prs: true

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
      - "DRAFT"
      - "[skip review]"

  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/.vite/**"
    - "!**/coverage/**"
    - "!.planning/**"
    - "!src/public/fonts/**"
    - "!mobile/assets/fonts/**"
    - "!**/*.lock"

  path_instructions:
    # ===== WEB FRONTEND =====
    - path: "src/components/**"
      instructions: |
        Web UI components (React 19 + Tailwind v4). Review for:
        - No hardcoded colors (use CSS variables — oklch tokens)
        - No raw z-index (use --z-* tokens)
        - No className concatenation (use cn() utility)
        - Named exports only (no default except route pages)
        - React.memo + custom comparator for list items
        - useCallback for callbacks to memoized children
        - Max 200 lines JSX per component

    - path: "src/components/chat/**"
      instructions: |
        Web chat UI. Performance-critical streaming path. Review for:
        - Scroll anchor behavior, streaming buffer handling
        - Message virtualization for long conversations
        - No unnecessary re-renders during streaming

    - path: "src/stores/**"
      instructions: |
        Zustand stores (Constitution 4.1-4.5). STRICT:
        - Selector-only access, useShallow for multi-field
        - No cross-store imports
        - Timeline: Immer middleware. Others: vanilla set()

    - path: "src/hooks/**"
      instructions: |
        Custom React hooks. Review for proper dependency arrays,
        cleanup in useEffect, no direct store mutations.

    - path: "src/lib/**"
      instructions: |
        Core infra (WebSocket, API, parsers). Review for reconnection logic,
        message validation, backpressure, no unhandled rejections.

    # ===== MOBILE (React Native + Expo) =====
    - path: "mobile/components/**"
      instructions: |
        React Native components (Expo SDK 53, RN 0.79). Review for:
        - All colors via theme.colors.* (createStyles pattern, NOT NativeWind)
        - All spacing via theme.spacing.* (off-grid values need justifying comment)
        - All radii via theme.radii.* tokens
        - 44px minimum touch targets (iOS HIG)
        - React.memo with custom comparator on list items
        - useCallback for all press handlers
        - No inline styles for static properties (use createStyles)
        - Reanimated springs from theme.springs.* (not inline configs)

    - path: "mobile/components/chat/**"
      instructions: |
        Mobile chat UI. Performance-critical. Review for:
        - FlatList: inverted, keyExtractor, renderItem memoized
        - No Keyboard.dismiss() on scroll (use keyboardDismissMode)
        - Stream rendering: useRef + rAF, not React state per token
        - MMKV persistence: consistent key prefixes, cleanup on delete

    - path: "mobile/components/navigation/**"
      instructions: |
        Drawer, header, session list. Review for:
        - swipeEdgeWidth respects iOS system back (not full-width)
        - Glass surfaces: BlurView + overlay opacity consistency
        - Stagger animations: max 10 items, 30ms delay
        - Session operations: haptic feedback, undo pattern

    - path: "mobile/theme/**"
      instructions: |
        Design token system (LoomTheme type). Review for:
        - Color values match lib/colors.ts constants
        - Typography: fontWeight must match fontFamily (500=Medium, 600=SemiBold)
        - No duplicate token values at different names
        - types.ts comments match actual values

    - path: "mobile/lib/**"
      instructions: |
        Mobile infrastructure. Review for:
        - MMKV: single shared instance preferred (not per-file new MMKV())
        - WebSocket: reconnect on foreground via .connect(token), NOT .tryReconnect()
        - Springs: all configs include reduceMotion: ReduceMotion.System
        - Haptics: appropriate feedback type per action

    - path: "mobile/stores/**"
      instructions: |
        Mobile Zustand stores (factory pattern from shared/). Review for:
        - MMKV storage adapter for persistence
        - Selector-only access pattern
        - No cross-store imports

    - path: "mobile/app/**"
      instructions: |
        Expo Router layouts and screens. Review for:
        - SplashScreen: gate on fonts + auth, handle font error
        - KeyboardAvoidingView or keyboard-controller usage
        - Safe area insets applied correctly
        - Route params: type-safe useLocalSearchParams

    # ===== SHARED =====
    - path: "shared/**"
      instructions: |
        Shared types and store factories used by both web and mobile. Review for:
        - No platform-specific imports (no react-native, no DOM APIs)
        - Generic storage adapter interfaces
        - Discriminated unions for message/stream types

    # ===== BACKEND =====
    - path: "server/**/*.js"
      instructions: |
        Express backend + SQLite. Review for:
        - Auth: JWT on protected routes
        - SQL: parameterized queries only (better-sqlite3 .prepare())
        - WebSocket: auth on upgrade, message validation
        - No credentials in code, no leaked stack traces
        - Path traversal prevention on file operations

    # ===== TESTS =====
    - path: "**/*.test.{ts,tsx}"
      instructions: |
        Test files (Vitest). Review for:
        - Store tests call reset() in beforeEach
        - No hardcoded timeouts (use waitFor)
        - Meaningful assertions

    # ===== CONFIG =====
    - path: "*.config.{js,ts,mjs}"
      instructions: |
        Build/tool config. No hardcoded secrets or env-specific values.

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false

  tools:
    eslint:
      enabled: true
    biome:
      enabled: false
    gitleaks:
      enabled: true
    semgrep:
      enabled: true
    markdownlint:
      enabled: false
    yamllint:
      enabled: true
    shellcheck:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000

chat:
  auto_reply: true

issue_enrichment:
  planning:
    enabled: true
    auto_planning:
      enabled: true
      labels:
        - "feature"
        - "enhancement"
        - "!no-plan"
        - "!bug"

knowledge_base:
  opt_out: false
  code_guidelines:
    enabled: true
    filePatterns:
      - "CLAUDE.md"
      - ".planning/V2_CONSTITUTION.md"
  learnings:
    scope: auto
  web_search:
    enabled: false
  issues:
    scope: auto
  pull_requests:
    scope: auto
